<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body { background: #000; color: #0f4; font-family: monospace; padding: 20px; text-align: center; }
  .scr { position: fixed; inset: 0; background: #000; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .hid { display: none !important; }
  input { background: #000; border: 1px solid #0f4; color: #0f4; font-size: 30px; width: 80%; padding: 15px; margin: 20px 0; text-align: center; }
  button { background: #0f4; color: #000; border: none; padding: 20px; width: 80%; font-weight: bold; font-size: 18px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
  .node { aspect-ratio: 1; border: 1px solid #0f4; background: #000; color: #0f4; font-size: 20px; font-weight: bold; }
  .red { background: #f03 !important; color: #fff !important; border-color: #fff !important; }
  .panel { border: 1px solid #0f4; margin-top: 20px; padding: 15px; background: #010; min-height: 100px; text-align: left; }
</style>
</head>
<body>

<div id="L" class="scr">
  <h2>SYSTEM LOCK</h2>
  <input type="number" id="P" placeholder="PASSCODE">
  <button onclick="login()">BYPASS FIREWALL</button>
</div>

<div id="Z" class="scr hid">
  <h2 id="ZQ">QUESTION</h2>
  <div id="ZC" style="display:flex; flex-direction:column; gap:10px; width:80%;"></div>
</div>

<div id="V" class="scr hid">
  <h1 style="color:#ff0">MISSION COMPLETE</h1>
  <p>S-CLASS OPERATIVE STATUS SECURED</p>
  <button onclick="location.reload()">REBOOT</button>
</div>

<div style="display:flex; justify-content:space-between; font-size:12px;">
  <span>INTEL: <span id="count">0</span>/15</span>
  <span style="color:#ff0">SESSION ACTIVE</span>
</div>

<div class="grid" id="G"></div>
<div class="panel" id="CP">[ AWAITING NODE ]</div>

<script>
  let collected = new Set();
  let active = null;
  const mission = [
    {q:"7+8?", c:["13","15","18"], a:"15", t:"Count stones at Auld Kirk."},
    {q:"SPY COLOR?", c:["Red","Blue","Black"], a:"Red", t:"Find 100yr old item at Auld Kirk."},
    {q:"WINDOWS?", c:["8","10","12"], a:"10", t:"Verify windows at Town Hall."},
    {q:"1-2-3", c:["CBA","ABC","CAB"], a:"ABC", t:"Find mark at Town Hall."},
    {q:"LIME COLOR?", c:["Yellow","Green","Purple"], a:"Green", t:"Spy pose at Town Hall."},
    {q:"SPIDER LEGS?", c:["6","8","10"], a:"8", t:"3 green items at Gardens."},
    {q:"NORTH OPP?", c:["East","West","South"], a:"South", t:"Stealth walk at Gardens."},
    {q:"HALF 30?", c:["15","20","25"], a:"15", t:"Next sector."},
    {q:"2,4,6,?", c:["7","8","10"], a:"8", t:"3 red items at Square."},
    {q:"1,2,3,?", c:["4","5","0"], a:"4", t:"Handshake at Square."},
    {q:"DOG REV", c:["GOD","DGO","ODG"], a:"GOD", t:"Head to Peel Park."},
    {q:"HIGH GROUND?", c:["Hill","Valley","River"], a:"Hill", t:"Highest point at Peel Park."},
    {q:"1+1?", c:["1","2","11"], a:"2", t:"Trust walk at Peel Park."},
    {q:"SQUARE SIDES?", c:["3","4","5"], a:"4", t:"Draw dirt map at Peel Park."},
    {q:"BALL COUNT?", c:["10","15","20"], a:"15", t:"MISSION COMPLETE."}
  ];

  function login() {
    if(document.getElementById('P').value === "1500") {
      document.getElementById('L').classList.add('hid');
      render();
    } else { alert("DENIED"); }
  }

  function render() {
    const g = document.getElementById('G'); g.innerHTML = '';
    for(let i=1; i<=15; i++) {
      const b = document.createElement('button');
      b.className = 'node' + (collected.has(i) ? ' red' : '');
      b.textContent = i;
      b.onclick = () => {
        if(collected.has(i)) { show(i); }
        else { openPuzzle(i); }
      };
      g.appendChild(b);
    }
    document.getElementById('count').textContent = collected.size;
  }

  function openPuzzle(n) {
    active = n;
    document.getElementById('ZQ').textContent = mission[n-1].q;
    const c = document.getElementById('ZC'); c.innerHTML = '';
    mission[n-1].c.forEach(choice => {
      const b = document.createElement('button');
      b.textContent = choice;
      b.style.background = "#0f4";
      b.onclick = () => {
        if(choice === mission[n-1].a) {
          collected.add(n);
          document.getElementById('Z').classList.add('hid');
          show(n); render();
          if(collected.size === 15) document.getElementById('V').classList.remove('hid');
        } else { alert("WRONG KEY"); }
      };
      c.appendChild(b);
    });
    document.getElementById('Z').classList.remove('hid');
  }

  function show(n) {
    document.getElementById('CP').innerHTML = `<strong>NODE ${n}:</strong><br>${mission[n-1].t}`;
  }
</script>
</body>
</html>
