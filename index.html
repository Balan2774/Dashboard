<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queenzieburn Command Center v11</title>
    <style>
        :root {
            --bg-overlay: rgba(15, 23, 42, 0.9);
            --card-bg: rgba(30, 41, 59, 0.95);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --kids-bg: rgba(12, 74, 110, 0.8);
            --kids-border: #0ea5e9;
            --changeover: #fbbf24;
            --border: rgba(51, 65, 85, 0.8);
            --bin-blue: #3b82f6;
            --bin-green: #22c55e;
            --bin-grey: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .page-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: 1; }

        #password-overlay, #settings-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(25px); transition: opacity 0.3s ease;
        }

        .modal-box { background: var(--card-bg); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center; }
        
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); 
            background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem;
        }

        .btn { background: var(--accent); color: #0f172a; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        /* Dashboard Layout - Mobile Responsive */
        .dashboard {
            position: relative; z-index: 2; display: grid; 
            grid-template-columns: 350px 1fr;
            gap: 20px; width: 95vw; max-width: 1400px; height: 90vh; padding: 20px; border-radius: 32px; 
            filter: blur(25px); transition: filter 0.5s ease;
            overflow-y: auto;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
                height: auto;
                padding: 10px;
                overflow-y: visible;
            }
            .sidebar {
                border-right: none !important;
                border-bottom: 1px solid var(--border);
                padding-right: 0 !important;
                padding-bottom: 20px;
            }
        }

        .unlocked .dashboard { filter: blur(0); }

        .sidebar { border-right: 1px solid var(--border); padding-right: 25px; display: flex; flex-direction: column; gap: 15px; position: relative;}
        
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }
        #clock { font-size: 3.5rem; font-weight: 900; color: var(--accent); line-height: 1; letter-spacing: -2px; }
        .settings-icon { cursor: pointer; font-size: 1.8rem; opacity: 0.6; transition: 0.3s; padding-top: 5px; }

        .info-card { background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .info-label { font-weight: 800; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }

        .bus-row { display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 5px; }

        .tab-nav { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: white; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; flex-grow: 1; }
        .tab-btn.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }

        .main-content { display: flex; flex-direction: column; height: 100%; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex-grow: 1; }
        .day { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 600; position: relative; min-height: 60px; }
        
        .kids-weekend { background-color: var(--kids-bg); border-color: var(--kids-border); }
        .changeover-day { border: 2px dashed var(--changeover) !important; }
        .today { background-color: var(--accent) !important; color: #0f172a !important; }

        .bin-tag { padding: 2px 4px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; margin-top: 4px; color: white; text-align: center; width: 90%; }
        .tag-blue { background: var(--bin-blue); }
        .tag-green { background: var(--bin-green); }
        .tag-grey { background: var(--bin-grey); }

        .ticker-wrap { position: fixed; bottom: 0; left: 0; width: 100%; height: 35px; background: rgba(0, 0, 0, 0.9); z-index: 10; display: flex; align-items: center; overflow: hidden; }
        .ticker { white-space: nowrap; animation: ticker 80s linear infinite; color: var(--accent); font-weight: 500; font-size: 0.9rem; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body id="main-body">

<div class="page-overlay"></div>

<div id="password-overlay">
    <div class="modal-box">
        <h2 style="color:white; margin-top:0;">System Locked</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <button class="btn" onclick="checkPassword()">UNLOCK</button>
    </div>
</div>

<div id="settings-overlay" style="display:none;">
    <div class="modal-box">
        <h2 style="color:white; margin-top:0;">Settings</h2>
        <label class="info-label">Access Password</label>
        <input type="text" id="set-pass">
        <label class="info-label">Kids Schedule Anchor (Fri)</label>
        <input type="date" id="set-kids-date">
        <label class="info-label">Monday Bin Ref (Blue Week)</label>
        <input type="date" id="set-bin-date">
        <button class="btn" onclick="saveSettings()">SAVE & RESTART</button>
        <button class="btn" style="background:#475569; color:white;" onclick="closeSettings()">CANCEL</button>
    </div>
</div>

<div class="dashboard">
    <div class="sidebar">
        <div class="header-row">
            <div>
                <div id="clock">00:00</div>
                <div id="date-str">...</div>
            </div>
            <div class="settings-icon" onclick="openSettings()">⚙️</div>
        </div>

        <div id="kids-countdown" style="font-weight:bold; color:var(--accent); margin-top:0px; font-size: 0.9rem;">...</div>

        <div class="info-card">
            <span class="info-label">Next Monday Bin</span>
            <div id="bin-display" style="font-weight:bold; color: var(--accent);">...</div>
        </div>
        <div class="info-card">
            <span class="info-label">Bus 89 &rarr; Glasgow</span>
            <div id="bus-list"></div>
        </div>
        <div class="info-card" style="text-align:center">
            <span id="temp" style="font-size: 1.8rem; font-weight:900;">--°C</span>
        </div>
    </div>

    <div class="main-content">
        <div class="tab-nav">
            <button class="tab-btn active" id="tab-kids" onclick="switchTab('kids')">Family</button>
            <button class="tab-btn" id="tab-bins" onclick="switchTab('bins')">Bins</button>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button onclick="changeMonth(-1)" class="tab-btn" style="flex-grow:0;">&lt;</button>
            <h2 id="month-name" style="margin:0; font-size: 1.8rem;">Month</h2>
            <button onclick="changeMonth(1)" class="tab-btn" style="flex-grow:0;">&gt;</button>
        </div>
        <div class="days-grid" id="calendar-days"></div>
    </div>
</div>

<div class="ticker-wrap"><div class="ticker" id="news-ticker">Fetching UK News...</div></div>

<script>
    const config = {
        password: localStorage.getItem('dashPass') || "1234",
        kidsAnchor: localStorage.getItem('kidsAnchor') || "2026-04-24",
        binAnchor: localStorage.getItem('binAnchor') || "2026-04-20"
    };

    let activeTab = 'kids';
    let viewDate = new Date();

    function checkPassword() {
        if (document.getElementById('pass-input').value === config.password) {
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('main-body').classList.add('unlocked');
        } else { alert("Wrong Password"); }
    }
    document.getElementById('pass-input').addEventListener('keypress', (e) => { if(e.key==='Enter') checkPassword(); });

    function openSettings() {
        document.getElementById('set-pass').value = config.password;
        document.getElementById('set-kids-date').value = config.kidsAnchor;
        document.getElementById('set-bin-date').value = config.binAnchor;
        document.getElementById('settings-overlay').style.display = 'flex';
    }

    function saveSettings() {
        localStorage.setItem('dashPass', document.getElementById('set-pass').value);
        localStorage.setItem('kidsAnchor', document.getElementById('set-kids-date').value);
        localStorage.setItem('binAnchor', document.getElementById('set-bin-date').value);
        location.reload();
    }

    function closeSettings() { document.getElementById('settings-overlay').style.display = 'none'; }

    function switchTab(type) {
        activeTab = type;
        document.getElementById('tab-kids').classList.toggle('active', type === 'kids');
        document.getElementById('tab-bins').classList.toggle('active', type === 'bins');
        buildCalendar();
    }

    function getBinForDate(dateObj) {
        if (dateObj.getDay() !== 1) return null;
        const anchor = new Date(config.binAnchor);
        const diffWeeks = Math.floor(Math.round((dateObj - anchor)/(1000*60*60*24))/7);
        const types = ["Blue Recycling", "Green + Brown", "General Waste"];
        const css = ["blue", "green", "grey"];
        const idx = ((diffWeeks % 3) + 3) % 3;
        return { name: types[idx], class: css[idx] };
    }

    function buildCalendar() {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        document.getElementById('month-name').textContent = `${viewDate.toLocaleString('default', { month: 'long' })} ${year}`;
        const container = document.getElementById('calendar-days');
        container.innerHTML = '';
        
        ['M','T','W','T','F','S','S'].forEach(d => container.innerHTML += `<div style="text-align:center; font-size:0.7rem; font-weight:800; color:var(--text-muted)">${d}</div>`);

        let firstDay = new Date(year, month, 1).getDay() - 1;
        if (firstDay === -1) firstDay = 6;
        for (let i = 0; i < firstDay; i++) container.appendChild(Object.assign(document.createElement('div'), {className:'day', style:'visibility:hidden'}));

        const kidsAnchorDate = new Date(config.kidsAnchor);
        for (let d = 1; d <= new Date(year, month + 1, 0).getDate(); d++) {
            const dateObj = new Date(year, month, d);
            const div = document.createElement('div');
            div.className = 'day'; div.innerHTML = `<span>${d}</span>`;
            
            if (activeTab === 'kids') {
                const day = dateObj.getDay();
                let calc = new Date(dateObj); if(day===0) calc.setDate(calc.getDate()-1);
                const diff = Math.round((calc - kidsAnchorDate)/(1000*60*60*24*7));
                const isKids = (day===5||day===6||day===0) && diff%2===0;
                if (isKids) div.classList.add('kids-weekend');
                if (isKids && day===5) div.classList.add('changeover-day');
            } else {
                const bin = getBinForDate(dateObj);
                if (bin) div.innerHTML += `<div class="bin-tag tag-${bin.class}">${bin.name.split(' ')[0]}</div>`;
            }

            if (d === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) div.classList.add('today');
            container.appendChild(div);
        }
    }

    const schedule = ["06:24", "07:24", "08:22", "09:04", "09:34", "10:04", "10:34", "11:04", "11:34", "12:04", "12:34", "13:04", "13:34", "14:04", "14:34", "15:04", "15:34", "16:04", "16:34", "17:04", "17:35", "18:34", "19:34", "20:29"];
    function updateBusTimes() {
        const now = new Date();
        const current = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const next = schedule.filter(t => t > current).slice(0, 3);
        document.getElementById('bus-list').innerHTML = next.map(t => `<div class="bus-row"><span>89</span><span>${t}</span></div>`).join('') || "No more buses";
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById('date-str').textContent = now.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        
        const kidsStatus = document.getElementById('kids-countdown');
        let check = new Date(now); check.setHours(0,0,0,0);
        for(let i=0; i<14; i++) {
            const day = check.getDay();
            let calc = new Date(check); if(day===0) calc.setDate(calc.getDate()-1);
            const diff = Math.round((calc - new Date(config.kidsAnchor))/(1000*60*60*24*7));
            if((day===5||day===6||day===0) && diff%2===0) {
                kidsStatus.textContent = i === 0 ? "KIDS ARE HERE! 🏠" : `${i}d until arrival`;
                break;
            }
            check.setDate(check.getDate()+1);
        }
    }

    function updateNextBin() {
        let nextMon = new Date();
        if(nextMon.getDay() !== 1) nextMon.setDate(nextMon.getDate() + (1 + 7 - nextMon.getDay()) % 7);
        const bin = getBinForDate(nextMon);
        document.getElementById('bin-display').textContent = bin ? bin.name : "Sync Settings";
    }

    setInterval(updateClock, 1000);
    setInterval(updateBusTimes, 30000);
    updateClock(); updateBusTimes(); buildCalendar(); updateNextBin();
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=55.9744&longitude=-4.0886&current_weather=true`).then(r=>r.json()).then(d=>document.getElementById('temp').textContent = Math.round(d.current_weather.temperature)+"°C");
    fetch('https://api.rss2json.com/v1/api.json?rss_url=http://feeds.bbci.co.uk/news/uk/rss.xml').then(r=>r.json()).then(d=>document.getElementById('news-ticker').innerHTML = d.items.map(i=>i.title).join(' • '));

    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); buildCalendar(); }
</script>
</body>
</html>
