<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queenzieburn Command Center v5</title>
    <style>
        :root {
            --bg-overlay: rgba(15, 23, 42, 0.88);
            --card-bg: rgba(30, 41, 59, 0.9);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --kids-bg: rgba(12, 74, 110, 0.8);
            --kids-border: #0ea5e9;
            --changeover: #fbbf24;
            --border: rgba(51, 65, 85, 0.5);
            --bin-blue: #3b82f6;
            --bin-green: #22c55e;
            --bin-grey: #64748b;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0f172a url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .page-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: 1; }

        #password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(25px); transition: opacity 0.5s ease;
        }

        .dashboard {
            position: relative; z-index: 2; display: grid; grid-template-columns: 350px 1fr; gap: 30px;
            width: 95vw; max-width: 1400px; height: 85vh; padding: 40px; border-radius: 32px;
            filter: blur(25px); transition: filter 0.5s ease;
        }
        .unlocked .dashboard { filter: blur(0); }

        .sidebar { border-right: 2px solid var(--border); padding-right: 30px; display: flex; flex-direction: column; gap: 20px; height: 100%; }
        #clock { font-size: 4.5rem; font-weight: 900; color: var(--accent); line-height: 1; letter-spacing: -2px; }
        
        .info-card { background: rgba(15, 23, 42, 0.6); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .info-label { font-weight: 800; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; }

        /* Bus Display Styling */
        .bus-list { display: flex; flex-direction: column; gap: 10px; }
        .bus-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .bus-number { color: var(--accent); font-weight: 900; font-size: 1.2rem; }
        .bus-time { font-weight: bold; }
        .bus-countdown { color: var(--changeover); font-size: 0.9rem; }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; flex-grow: 1; }
        .day { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 600; position: relative; }
        .kids-weekend { background-color: var(--kids-bg); border-color: var(--kids-border); }
        .changeover-day { border: 3px dashed var(--changeover) !important; }
        .today { background-color: var(--accent) !important; color: #0f172a !important; transform: scale(1.05); }

        .ticker-wrap { position: fixed; bottom: 0; left: 0; width: 100%; height: 35px; background: rgba(0, 0, 0, 0.9); z-index: 10; display: flex; align-items: center; overflow: hidden; }
        .ticker { white-space: nowrap; animation: ticker 60s linear infinite; color: var(--accent); }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body id="main-body">

<div class="page-overlay"></div>

<div id="password-overlay">
    <div style="background:#1e293b; padding:40px; border-radius:24px; text-align:center;">
        <h2 style="color:white">Queenzieburn System</h2>
        <input type="password" id="pass-input" style="padding:12px; border-radius:8px; border:none; text-align:center;" placeholder="Enter Password" autofocus>
        <button onclick="checkPassword()" style="margin-top:15px; display:block; width:100%; padding:12px; background:var(--accent); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">UNLOCK</button>
    </div>
</div>

<div class="dashboard">
    <div class="sidebar">
        <div>
            <div id="clock">00:00</div>
            <div id="date-str">...</div>
            <div id="kids-countdown" style="font-weight:bold; color:var(--accent); margin-top:10px;">...</div>
        </div>

        <div class="info-card" style="flex-grow:1;">
            <span class="info-label">Bus 89: Recreation Ground &rarr; Glasgow</span>
            <div id="bus-list" class="bus-list">
                </div>
        </div>

        <div class="info-card">
            <span class="info-label">Monday Bin Collection</span>
            <div id="bin-display" style="font-weight:bold; font-size: 1.2rem;">...</div>
        </div>

        <div class="info-card" style="text-align:center">
            <span id="temp" style="font-size: 2.2rem; font-weight:900;">--°C</span>
        </div>
    </div>

    <div class="calendar-container" style="display:flex; flex-direction:column;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <button onclick="changeMonth(-1)" style="background:none; border:1px solid white; color:white; border-radius:8px; padding:8px 20px; cursor:pointer;">Previous</button>
            <h2 id="month-name" style="margin:0; font-size: 2.5rem;">Month</h2>
            <button onclick="changeMonth(1)" style="background:none; border:1px solid white; color:white; border-radius:8px; padding:8px 20px; cursor:pointer;">Next</button>
        </div>
        <div class="days-grid" id="calendar-days"></div>
    </div>
</div>

<div class="ticker-wrap">
    <div class="ticker" id="news-ticker">Fetching UK News Headlines...</div>
</div>

<script>
    // --- TIMETABLE DATA FROM PDF ---
    // Times shown are Kilsyth Parkfoot + 4 mins estimate for Recreation Ground
    const schedule = {
        weekday: ["06:24", "07:24", "08:22", "09:04", "09:34", "10:04", "10:34", "11:04", "11:34", "12:04", "12:34", "13:04", "13:34", "14:04", "14:34", "15:04", "15:34", "16:04", "16:34", "17:04", "17:35", "18:34", "19:34", "20:29"],
        saturday: ["06:24", "07:24", "08:22", "09:04", "09:34", "10:04", "10:34", "11:04", "11:34", "12:04", "12:34", "13:04", "13:34", "14:04", "14:34", "15:04", "15:34", "16:04", "16:34", "17:04", "17:35", "18:34", "19:34", "20:29"],
        sunday: ["08:21", "09:21", "10:21", "11:21", "12:21", "13:21", "14:21", "15:21", "16:21", "17:22", "18:25", "19:25", "20:25"]
    };

    const correctPassword = "1234";
    function checkPassword() {
        if (document.getElementById('pass-input').value === correctPassword) {
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('main-body').classList.add('unlocked');
        }
    }

    function updateBusTimes() {
        const now = new Date();
        const day = now.getDay();
        const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        let activeSchedule = schedule.weekday;
        if (day === 6) activeSchedule = schedule.saturday;
        if (day === 0) activeSchedule = schedule.sunday;

        const nextBuses = activeSchedule.filter(t => t > currentTime).slice(0, 4);
        const listEl = document.getElementById('bus-list');
        listEl.innerHTML = "";

        if (nextBuses.length === 0) {
            listEl.innerHTML = "<div class='bus-row'>No more buses today</div>";
            return;
        }

        nextBuses.forEach(time => {
            const [h, m] = time.split(':').map(Number);
            const busDate = new Date(); busDate.setHours(h, m, 0, 0);
            const diff = Math.round((busDate - now) / 60000);
            
            listEl.innerHTML += `
                <div class="bus-row">
                    <span class="bus-number">89</span>
                    <span class="bus-time">${time}</span>
                    <span class="bus-countdown">${diff}m</span>
                </div>`;
        });
    }

    let viewDate = new Date();
    const kidsAnchor = new Date(2026, 3, 24); 
    const binAnchor = new Date(2026, 3, 20); 

    function buildCalendar() {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        document.getElementById('month-name').textContent = `${viewDate.toLocaleString('default', { month: 'long' })} ${year}`;
        const container = document.getElementById('calendar-days');
        container.innerHTML = '';
        
        ['MON','TUE','WED','THU','FRI','SAT','SUN'].forEach(day => {
            const div = document.createElement('div');
            div.style.textAlign = 'center'; div.style.fontSize = '0.8rem'; div.style.color = 'var(--text-muted)'; div.style.fontWeight = '800';
            div.textContent = day; container.appendChild(div);
        });

        let firstDay = new Date(year, month, 1).getDay() - 1;
        if (firstDay === -1) firstDay = 6;
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) container.appendChild(Object.assign(document.createElement('div'), {className:'day', style:'visibility:hidden'}));

        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month, d);
            const div = document.createElement('div');
            div.className = 'day'; div.textContent = d;

            const day = dateObj.getDay();
            let calcDate = new Date(dateObj); if (day === 0) calcDate.setDate(calcDate.getDate() - 1);
            const diffWeeks = Math.round((calcDate - kidsAnchor) / (1000 * 60 * 60 * 24 * 7));
            const isKids = (day === 5 || day === 6 || day === 0) && (diffWeeks % 2 === 0);

            if (isKids) div.classList.add('kids-weekend');
            if (isKids && day === 5) div.classList.add('changeover-day');
            if (d === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) div.classList.add('today');
            container.appendChild(div);
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById('date-str').textContent = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
        
        // Kids Countdown
        const kidsStatus = document.getElementById('kids-countdown');
        let check = new Date(now); check.setHours(0,0,0,0);
        for(let i=0; i<14; i++) {
            const day = check.getDay();
            let calc = new Date(check); if(day===0) calc.setDate(calc.getDate()-1);
            const diff = Math.round((calc - kidsAnchor)/(1000*60*60*24*7));
            if((day===5||day===6||day===0) && diff%2===0) {
                kidsStatus.textContent = i === 0 ? "KIDS ARE HERE! 🏠" : `${i} days until arrival`;
                break;
            }
            check.setDate(check.getDate()+1);
        }
    }

    async function fetchWeather() {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=55.9744&longitude=-4.0886&current_weather=true`);
        const d = await res.json();
        document.getElementById('temp').textContent = Math.round(d.current_weather.temperature) + "°C";
    }

    async function fetchNews() {
        const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=http://feeds.bbci.co.uk/news/uk/rss.xml');
        const d = await res.json();
        document.getElementById('news-ticker').innerHTML = d.items.map(i => i.title).join(' • ');
    }

    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); buildCalendar(); }

    setInterval(updateClock, 1000);
    setInterval(updateBusTimes, 30000);
    updateClock(); updateBusTimes(); buildCalendar(); fetchWeather(); fetchNews();

    // Bin Display
    let nextMon = new Date();
    nextMon.setDate(nextMon.getDate() + (1 + 7 - nextMon.getDay()) % 7);
    const binDiff = Math.floor(Math.round((nextMon - binAnchor)/(1000*60*60*24))/7);
    const bins = ["Blue Recycling", "Green + Brown", "General Waste"];
    document.getElementById('bin-display').textContent = bins[binDiff % 3];
</script>
</body>
</html>
