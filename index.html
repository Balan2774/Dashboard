<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queenzieburn Command Center v19</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --bg-overlay: rgba(15, 23, 42, 0.92);
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --kids-bg: rgba(12, 74, 110, 0.8);
            --kids-border: #0ea5e9;
            --changeover: #fbbf24;
            --border: rgba(51, 65, 85, 0.8);
            --bin-blue: #3b82f6;
            --bin-green: #22c55e;
            --bin-grey: #64748b;
            --news-red: #cc0000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;
        }

        .page-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: 1; }

        /* Dashboard Container */
        .dashboard {
            position: relative; z-index: 2; display: grid; grid-template-columns: 320px 1fr;
            gap: 25px; width: 95vw; max-width: 1400px; margin: auto; padding: 20px;
            filter: blur(25px); transition: filter 0.5s ease;
        }
        .unlocked .dashboard { filter: blur(0); }

        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; width: 100vw; padding: 10px; margin-bottom: 60px; }
            .sidebar { border-right: none !important; border-bottom: 1px solid var(--border); padding-right: 0 !important; }
        }

        /* Sidebar Styling */
        .sidebar { border-right: 1px solid var(--border); padding-right: 25px; display: flex; flex-direction: column; gap: 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
        #clock { font-size: 3.5rem; font-weight: 900; color: var(--accent); line-height: 1; }
        .settings-icon { cursor: pointer; font-size: 1.5rem; opacity: 0.6; transition: 0.3s; }

        .info-card { background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .info-label { font-weight: 800; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .bus-row { display: flex; justify-content: space-between; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 5px; font-size: 0.9rem; }

        /* Tabs & Navigation */
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: white; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; flex-grow: 1; text-align: center; }
        .tab-btn.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }

        /* Media Player */
        .media-box { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .artwork-img { width: 220px; height: 220px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: cover; background: #1e293b; border: 1px solid var(--border); }
        #track-title { font-weight: bold; font-size: 1.2rem; }
        #track-artist { color: var(--accent); }

        /* TV Ticker Styling */
        .news-banner {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50px;
            background: rgba(15, 23, 42, 0.98); z-index: 100;
            display: flex; align-items: center; border-top: 3px solid var(--news-red);
        }
        .news-tag {
            background: var(--news-red); color: white; height: 100%; padding: 0 20px;
            display: flex; align-items: center; font-weight: 900; letter-spacing: 1px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 101;
        }
        .ticker-container { flex-grow: 1; overflow: hidden; height: 100%; display: flex; align-items: center; }
        .ticker-move { white-space: nowrap; animation: ticker 60s linear infinite; font-size: 1.1rem; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Overlays */
        #password-overlay, #settings-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(25px);
        }
        .modal { background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; box-sizing: border-box; }
        
        /* Calendar Grid */
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 600; min-height: 80px; position: relative; }
        .kids-weekend { background: var(--kids-bg); border-color: var(--kids-border); }
        .today { background: var(--accent) !important; color: #0f172a !important; }
        .bin-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; }
    </style>
</head>
<body id="main-body">

<div class="page-overlay"></div>

<div id="password-overlay">
    <div class="modal">
        <h2>System Locked</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <button class="tab-btn active" style="width:100%" onclick="checkPassword()">UNLOCK</button>
    </div>
</div>

<div class="dashboard">
    <div class="sidebar">
        <div class="header-row">
            <div>
                <div id="clock">00:00</div>
                <div id="date-str">...</div>
            </div>
            <div class="settings-icon" onclick="openSettings()">⚙️</div>
        </div>

        <div id="kids-countdown" style="font-weight:bold; color:var(--accent);">...</div>

        <div class="info-card">
            <span class="info-label">Monday Bin Collection</span>
            <div id="bin-display" style="font-weight:bold; color: var(--accent);">...</div>
        </div>

        <div class="info-card">
            <span class="info-label">Bus 89 &rarr; Glasgow</span>
            <div id="bus-list"></div>
        </div>

        <div class="info-card" style="text-align:center">
            <div id="weather-info" style="font-size: 2rem; font-weight: 900;">10°C</div>
        </div>
    </div>

    <div class="main-content">
        <div class="tab-nav">
            <button class="tab-btn active" id="tab-kids" onclick="switchTab('kids')">Family</button>
            <button class="tab-btn" id="tab-bins" onclick="switchTab('bins')">Bins</button>
            <button class="tab-btn" id="tab-media" onclick="switchTab('media')">Media</button>
        </div>

        <div id="calendar-view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <button onclick="changeMonth(-1)" class="tab-btn" style="flex-grow:0;">&lt;</button>
                <h2 id="month-name" style="margin:0;">Month</h2>
                <button onclick="changeMonth(1)" class="tab-btn" style="flex-grow:0;">&gt;</button>
            </div>
            <div class="days-grid" id="calendar-days"></div>
        </div>

        <div id="media-view" style="display:none;" class="media-box">
            <img id="artwork" class="artwork-img" src="" alt="Artwork">
            <div id="track-title">Waiting for Stream...</div>
            <div id="track-artist">Select a Station</div>
            
            <select id="station-select" onchange="changeStation()">
                <option value="s625848e0c">BBC Radio Scotland</option>
                <option value="s23057e2c9">BBC Radio 2</option>
                <option value="s3b6e8e815">Heart Scotland</option>
            </select>

            <audio id="audio-player"></audio>
            <button class="tab-btn active" style="width:200px" onclick="togglePlay()">PLAY / PAUSE</button>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="tab-btn" style="background:#ff0000; border:none;" onclick="window.open('https://music.youtube.com')">YT Music</button>
                <button class="tab-btn" style="background:#1DB954; border:none;" onclick="window.open('https://spotify.com')">Spotify</button>
            </div>
        </div>
    </div>
</div>

<div class="news-banner">
    <div class="news-tag">BREAKING</div>
    <div class="ticker-container">
        <div class="ticker-move" id="news-ticker">Fetching UK News Headlines...</div>
    </div>
</div>

<script>
    const config = {
        password: localStorage.getItem('dashPass') || "1234",
        kidsAnchor: localStorage.getItem('kidsAnchor') || "2026-04-24",
        binAnchor: localStorage.getItem('binAnchor') || "2026-04-20"
    };

    // --- Media Logic ---
    function changeStation() {
        const stationId = document.getElementById('station-select').value;
        const player = document.getElementById('audio-player');
        player.src = `https://streaming.radio.co/${stationId}/listen`;
        updateTrackInfo(stationId);
        player.play();
    }

    function updateTrackInfo(id) {
        fetch(`https://public.radio.co/api/v2/${id}/track/current`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('track-title').innerText = data.data.track_title || "Live Stream";
                document.getElementById('track-artist').innerText = data.data.track_artist || "Radio";
                document.getElementById('artwork').src = data.data.artwork_urls.standard || "";
            });
    }

    function togglePlay() {
        const player = document.getElementById('audio-player');
        if (player.paused) player.play(); else player.pause();
    }

    // --- Core Logic ---
    function checkPassword() {
        if (document.getElementById('pass-input').value === config.password) {
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('main-body').classList.add('unlocked');
        }
    }

    function switchTab(tab) {
        document.getElementById('calendar-view').style.display = tab === 'media' ? 'none' : 'block';
        document.getElementById('media-view').style.display = tab === 'media' ? 'flex' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        if (tab !== 'media') buildCalendar(tab);
    }

    // --- Calendar & Bins ---
    let viewDate = new Date();
    function buildCalendar(tab = 'kids') {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        document.getElementById('month-name').innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        const container = document.getElementById('calendar-days');
        container.innerHTML = '';

        ['MON','TUE','WED','THU','FRI','SAT','SUN'].forEach(d => {
            container.innerHTML += `<div style="text-align:center; font-size:0.7rem; color:var(--text-muted)">${d}</div>`;
        });

        let firstDay = new Date(year, month, 1).getDay() - 1;
        if (firstDay === -1) firstDay = 6;
        for (let i = 0; i < firstDay; i++) container.innerHTML += '<div></div>';

        for (let d = 1; d <= new Date(year, month + 1, 0).getDate(); d++) {
            const date = new Date(year, month, d);
            const isToday = d === new Date().getDate() && month === new Date().getMonth();
            let classes = isToday ? 'day today' : 'day';
            
            // Kids Rotation Logic 
            const dayOfWeek = date.getDay();
            const diffWeeks = Math.floor((date - new Date(config.kidsAnchor)) / (7 * 24 * 60 * 60 * 1000));
            if ((dayOfWeek === 5 || dayOfWeek === 6 || dayOfWeek === 0) && diffWeeks % 2 === 0 && tab === 'kids') {
                classes += ' kids-weekend';
            }

            let content = `<span>${d}</span>`;
            if (tab === 'bins' && dayOfWeek === 1) {
                const binIdx = Math.floor((date - new Date(config.binAnchor)) / (7 * 24 * 60 * 60 * 1000)) % 3;
                const colors = [var(--bin-blue), var(--bin-green), var(--bin-grey)];
                content += `<div class="bin-dot" style="background:${colors[binIdx]}"></div>`;
            }

            container.innerHTML += `<div class="${classes}">${content}</div>`;
        }
    }

    // --- Schedule & Weather ---
    const busSchedule = ["06:24", "07:24", "08:22", "09:04", "09:34", "10:04", "10:34", "11:04", "11:34", "12:04", "12:34", "13:04", "13:34", "14:04", "14:34", "15:04", "15:34", "16:04", "16:34", "17:04", "17:35", "18:34", "19:34", "20:29"]; [cite: 13, 71]
    
    function updateDashboard() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date-str').innerText = now.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        
        const nextBuses = busSchedule.filter(t => t > now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', hour12: false})).slice(0, 3);
        document.getElementById('bus-list').innerHTML = nextBuses.map(t => `<div class="bus-row"><span>89</span><span>${t}</span></div>`).join('');
    }

    setInterval(updateDashboard, 1000);
    buildCalendar();
    updateDashboard();

    // Fetch News
    fetch('https://api.rss2json.com/v1/api.json?rss_url=http://feeds.bbci.co.uk/news/uk/rss.xml')
        .then(res => res.json())
        .then(data => {
            document.getElementById('news-ticker').innerText = data.items.map(i => i.title).join(' • ');
        });
</script>

</body>
</html>
