<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queenzieburn Command Center v20</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --bg-overlay: rgba(15, 23, 42, 0.92);
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-main: #f1f5f9;
            --accent: #38bdf8;
            --border: rgba(51, 65, 85, 0.8);
            --news-red: #cc0000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;
        }

        /* FIX: High Z-Index for Unlock Screen */
        #password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; justify-content: center; align-items: center;
            z-index: 10000; /* Ensure it is above EVERYTHING */
        }

        .modal { 
            background: var(--card-bg); padding: 40px; border-radius: 24px; 
            border: 1px solid var(--border); width: 90%; max-width: 400px; 
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative; z-index: 10001; /* Prevent blur interference */
        }

        input { 
            width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; 
            border: 2px solid var(--border); background: #0f172a; color: white; 
            box-sizing: border-box; font-size: 1.2rem; text-align: center;
        }

        .unlock-btn { 
            background: var(--accent); color: #0f172a; border: none; 
            padding: 15px 30px; border-radius: 12px; font-weight: 900; 
            cursor: pointer; width: 100%; font-size: 1.1rem;
        }

        .dashboard {
            position: relative; z-index: 2; display: grid; grid-template-columns: 320px 1fr;
            gap: 25px; width: 95vw; max-width: 1400px; margin: auto; padding: 20px;
            filter: blur(25px); transition: filter 0.8s ease;
        }
        
        /* Transition fix for modern browsers */
        .unlocked .dashboard { filter: blur(0) !important; pointer-events: auto !important; }

        /* Other styles remain consistent with v19... */
    </style>
</head>
<body id="main-body">

<div id="password-overlay">
    <div class="modal">
        <h2 style="margin-top:0">System Locked</h2>
        <p style="color:var(--accent); font-size:0.9rem;">Queenzieburn Command Center</p>
        <input type="password" id="pass-input" placeholder="Enter PIN" autofocus>
        <button class="unlock-btn" onclick="checkPassword()">UNLOCK SYSTEM</button>
    </div>
</div>

<script>
    // FIX: Get Password from LocalStorage or Default
    const getStoredPass = () => localStorage.getItem('dashPass') || "1234";

    function checkPassword() {
        const input = document.getElementById('pass-input').value;
        const correct = getStoredPass();
        
        if (input === correct) {
            // Smooth fade out
            const overlay = document.getElementById('password-overlay');
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.5s ease';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('main-body').classList.add('unlocked');
            }, 500);
        } else {
            alert("Access Denied");
            document.getElementById('pass-input').value = "";
        }
    }

    // FIX: Universal listener for "Enter" key on TV remotes and Mobile
    document.getElementById('pass-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); // Prevents page reload
            checkPassword();
        }
    });

    // Re-include core functions from v19 (Calendar, Weather, Bus Times, etc.)
</script>
</body>
</html>
